spring:

  main:
    allow-bean-definition-overriding: true

  jpa:
    show-sql: true

  datasource:
    url: 'jdbc:postgresql://localhost:5432/official-visits-test-db'
    username: official-visits
    password: official-visits
    hikari:
      minimum-idle: 5

  flyway:
    locations: classpath:/migrations/common,classpath:/migrations/test
    placeholders:
      dpr_user: dpr_user
      dpr_password: dpr_password

server:
  shutdown: immediate

management.endpoint:
  health.cache.time-to-live: 0
  info.cache.time-to-live: 0

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

api:
  base:
    url:
      hmpps-auth: http://localhost:8090/auth
      locations-inside-prison: http://localhost:8091
      prisoner-search: http://localhost:8092
      manage-users: http://localhost:8093
      personal-relationships: http://localhost:8094

feature:
  event:
    official-visits-api:
      visit:
        created: true
        updated: true
        cancelled: true
        deleted: true
      visitor:
        created: true
        updated: true
        deleted: true
      prisoner:
        updated: true
      time-slot:
        created: true
        updated: true
        deleted: true
      visit-slot:
        created: true
        updated: true
        deleted: true

notify:
  callback:
    secret: "TestSecret"

hmpps:
  sar:
    tests:
      attachments-expected: false
      expected-flyway-schema-version: 2026.07.01
      expected-jpa-entity-schema:
        path: /sar/entity-schema.json
      expected-api-response:
        path: /sar/sar-api-response.json
      expected-render-result:
        path: /sar/sar-generated-report.html
